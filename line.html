<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BossBoard LINE Personal Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./static/line.css" />
    <link rel="stylesheet" href="./static/liff-polish.css?v=20260528-header4" />
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  </head>
  <body>
    <main class="phone-app">
      <header class="app-header">
        <button class="menu-button" type="button" aria-label="Menu"><span class="material-symbols-outlined">menu</span><span class="menu-label">เมนู</span></button>
        <a class="brand-center" href="./line.html" aria-label="BossBoard home">
          <img src="/brand/bossboard-mascot.png" alt="" />
          <span><strong>Boss</strong>Board</span>
        </a>
        <div class="header-actions">
          <button class="round-button" type="button" aria-label="Notifications"><span class="material-symbols-outlined">notifications</span></button>
          <div class="profile-dot">👤</div>
        </div>
      </header>
      <div class="boss-marquee" aria-hidden="true">
        <span>⚡ จัดการงานให้เสร็จ ⚡ ทำเลย ⚡ BOSS MODE ACTIVATED ⚡ THE BOSS IS WATCHING ⚡ NO EXCUSES ⚡</span>
      </div>

      <section class="line-status-card">
        <div>
          <strong id="lineStatusTitle">กำลังตรวจสอบ LINE</strong>
          <p id="lineStatusText">กำลังโหลดการตั้งค่า LIFF และ Messaging API</p>
        </div>
        <button id="lineLoginButton" class="status-action-button hidden" type="button">เข้า LINE</button>
      </section>

      <section class="section-header">
        <div>
          <h2>ตารางงาน</h2>
          <p id="filterText">แสดงงานทั้งหมด</p>
        </div>
        <button id="newMobileTaskButton" class="add-button" type="button">+ เพิ่มงาน</button>
      </section>

      <section id="taskList" class="task-list"></section>
    </main>

    <nav class="bottom-nav">
      <button class="active" data-nav-view="home" type="button"><span class="material-symbols-outlined">home</span>หน้าหลัก</button>
      <button data-nav-view="projects" type="button"><span class="material-symbols-outlined">folder_open</span>โปรเจกต์</button>
      <button data-nav-view="create" type="button"><span class="material-symbols-outlined">add</span>เพิ่มงาน</button>
      <button data-nav-view="tasks" type="button"><span class="material-symbols-outlined">task_alt</span>งานของฉัน</button>
      <button data-nav-view="line" type="button"><span>LINE</span>LINE</button>
    </nav>

    <div id="toast" class="toast hidden"></div>

    <dialog id="taskDialog" class="task-dialog">
      <form id="mobileTaskForm" method="dialog">
        <div class="dialog-header">
          <h2>เพิ่ม/แก้งาน</h2>
          <button id="closeDialogButton" class="round-button" type="button">×</button>
        </div>
        <input id="mobileTaskId" type="hidden" />
        <label>
          ชื่องาน
          <input id="mobileTaskTitle" required />
        </label>
        <label>
          รายละเอียด
          <textarea id="mobileTaskDescription"></textarea>
        </label>
        <label>
          โปรเจกต์
          <select id="mobileTaskProject"></select>
        </label>
        <label id="mobileTaskNewProjectLabel" class="hidden">
          ชื่อโปรเจกต์ใหม่
          <input id="mobileTaskNewProject" />
        </label>
        <div class="form-row">
          <label>
            ผู้รับผิดชอบ
            <select id="mobileTaskAssigneeUserId"></select>
          </label>
          <label>
            วันครบกำหนด
            <input id="mobileTaskDueDate" type="date" required />
          </label>
          <label>
            เวลา
            <input id="mobileTaskDueTime" type="time" />
          </label>
        </div>
        <div class="form-row">
          <label>
            สถานะ
            <select id="mobileTaskStatus">
              <option value="todo">รอทำ</option>
              <option value="progress">กำลังทำ</option>
              <option value="review">รอตรวจ</option>
              <option value="done">เสร็จแล้ว</option>
            </select>
          </label>
          <label>
            ความสำคัญ
            <select id="mobileTaskPriority">
              <option value="high">ด่วน</option>
              <option value="medium">ปกติ</option>
              <option value="low">ต่ำ</option>
            </select>
          </label>
        </div>
        <div class="dialog-actions-row">
          <button class="save-button" type="submit">บันทึก</button>
          <button id="mobileTaskDeleteButton" class="danger-outline-button hidden" type="button">ลบงาน</button>
        </div>
      </form>
    </dialog>

    <script src="./static/line.js"></script>
    <script src="./static/undo-overrides.js"></script>
    <script src="./static/feed-overrides.js"></script>
  </body>
</html>
